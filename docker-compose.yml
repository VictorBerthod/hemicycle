services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8048:8048"
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    environment:
      - PYTHONPATH=/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8048 --reload

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  backend-data:
